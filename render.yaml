services:
  - type: web
    name: daleel-fullstack
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /data/daleel.db
    disk:
      name: daleel-data
      mountPath: /data
      sizeGB: 1
